name: verify

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Gate 1: type/content check + production build.
      # For a static site the build is the test — it validates every content
      # entry against its Zod schema and fails on broken references.
      - name: Verify (astro check + build)
        run: pnpm verify

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      # Gate 2: smoke test — key pages render, nav works, no broken internal links.
      - name: E2E smoke test
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
